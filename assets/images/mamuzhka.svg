<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="dress" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="apron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
  </defs>
  <!-- Head / headscarf -->
  <ellipse cx="32" cy="14" rx="12" ry="10" fill="url(#body)"/>
  <ellipse cx="32" cy="12" rx="11" ry="7" fill="#e74c3c"/>
  <ellipse cx="32" cy="11" rx="9" ry="5" fill="#ff6b6b"/>
  <!-- Face -->
  <ellipse cx="32" cy="18" rx="8" ry="7" fill="#fdebd0"/>
  <!-- Eyes -->
  <circle cx="29" cy="17" r="1.5" fill="#2c3e50"/>
  <circle cx="35" cy="17" r="1.5" fill="#2c3e50"/>
  <!-- Smile -->
  <path d="M 29 20 Q 32 22 35 20" stroke="#2c3e50" stroke-width="1" fill="none"/>
  <!-- Rosy cheeks -->
  <circle cx="27" cy="19" r="1.5" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="37" cy="19" r="1.5" fill="#ff6b6b" opacity="0.6"/>
  <!-- Neck -->
  <rect x="30" y="24" width="4" height="3" fill="#fdebd0"/>
  <!-- Body / dress -->
  <path d="M 20 27 C 20 27, 14 35, 14 48 Q 14 54, 20 56 L 44 56 Q 50 54, 50 48 C 50 35, 44 27, 44 27 Z" fill="url(#dress)"/>
  <!-- Apron -->
  <path d="M 24 27 L 24 52 Q 24 54, 26 54 L 38 54 Q 40 54, 40 52 L 40 27 Z" fill="url(#apron)"/>
  <!-- Apron flowers -->
  <circle cx="32" cy="34" r="2" fill="#f39c12"/>
  <circle cx="32" cy="42" r="2" fill="#f39c12"/>
  <circle cx="28" cy="38" r="1.5" fill="#27ae60"/>
  <circle cx="36" cy="38" r="1.5" fill="#27ae60"/>
  <!-- Hands -->
  <ellipse cx="18" cy="40" rx="4" ry="3" fill="#fdebd0"/>
  <ellipse cx="46" cy="40" rx="4" ry="3" fill="#fdebd0"/>
  <!-- Inner matryoshka outline hint -->
  <ellipse cx="32" cy="40" rx="4" ry="5" fill="none" stroke="#f39c12" stroke-width="0.8" opacity="0.5"/>
</svg>