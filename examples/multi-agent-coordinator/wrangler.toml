name = "nesa-coordinator"
main = "src/index.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

# KV for persistent state (local simulation via Miniflare)
[[kv_namespaces]]
binding = "STATE"
id = "nesa-coordinator-state"

# KV for interaction logs (falls back to STATE if not configured)
[[kv_namespaces]]
binding = "LOGS"
id = "nesa-coordinator-logs"

# Durable Object — Agent state + WebSocket + scheduling
[durable_objects]
bindings = [
  { name = "AgentDO", class_name = "AgentDO" }
]

# Durable Object migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentDO"]

# For production, uncomment and set your namespace IDs:
# [[kv_namespaces]]
# binding = "STATE"
# id = "your-kv-namespace-id"
# [[kv_namespaces]]
# binding = "LOGS"
# id = "your-logs-namespace-id"
# [[durable_objects]]
# bindings = [
#   { name = "AgentDO", class_name = "AgentDO" }
# ]
